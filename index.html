<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI TikTok Generator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  height: 100vh;
  overflow: hidden;
  background: #0a0a0a;
}

/* fundal gradient neon */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at top, #ff00ff33, transparent 40%),
              radial-gradient(circle at bottom, #00ffff33, transparent 40%),
              #050505;
  z-index: 0;
}

/* emoji-uri care plutesc */
.emoji {
  position: absolute;
  font-size: 28px;
  opacity: 0.7;
  animation: floatUp 10s linear infinite;
}

@keyframes floatUp {
  from {
    transform: translateY(100vh) rotate(0deg);
    opacity: 0;
  }
  10% { opacity: 1; }
  to {
    transform: translateY(-10vh) rotate(360deg);
    opacity: 0;
  }
}

/* conținut principal */
.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 42px;
  text-shadow: 0 0 20px #ff00ff;
}

button {
  margin-top: 20px;
  padding: 12px 22px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg,#ff00ff,#00ffff);
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">
  <h1>Bine ai venit 🚀</h1>
  <p>AI TikTok Video Generator</p>
  <button>Start</button>
</div>

<!-- emoji-uri TikTok style -->
<div class="emoji" style="left:10%">❤️</div>
<div class="emoji" style="left:25%; animation-delay:2s">🔥</div>
<div class="emoji" style="left:40%; animation-delay:4s">👍</div>
<div class="emoji" style="left:60%; animation-delay:1s">💬</div>
<div class="emoji" style="left:80%; animation-delay:3s">🚀</div>

</body>
</html>
