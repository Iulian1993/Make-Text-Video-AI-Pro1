<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI TikTok Generator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  overflow: hidden;
  color: white;
  background: #0b0b0f;
}

/* emoji background */
.emoji {
  position: absolute;
  top: -50px;
  font-size: 24px;
  animation: fall linear infinite;
  opacity: 0.8;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}

/* overlay */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
}

/* container */
.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 44px;
  text-shadow: 0 0 20px #ff00ff, 0 0 30px #00ffff;
}

button {
  margin-top: 20px;
  padding: 12px 24px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: linear-gradient(45deg,#ff00ff,#00ffff);
  font-weight: bold;
}

#box {
  display:none;
  margin-top:20px;
}

input {
  padding:12px;
  border-radius:10px;
  border:none;
  width:250px;
}

#result {
  margin-top:15px;
  white-space: pre-line;
}

/* hearts */
.heart {
  position: absolute;
  font-size: 28px;
  animation: pop 1s ease-out forwards;
  pointer-events: none;
}

@keyframes pop {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: translateY(-100px) scale(2); opacity: 0; }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
  <h1>AI TikTok Generator 🚀</h1>

  <button onclick="document.getElementById('box').style.display='block'">
    Start
  </button>

  <div id="box">
    <input id="idea" placeholder="Scrie ideea ta..." />
    <br><br>
    <button onclick="generate()">Generează</button>

    <p id="result"></p>
  </div>
</div>

<script>
const emojis = ["🔥","😂","💰","🚀","❤️","⚡","💎","😎"];

/* emoji rain */
function createEmoji(){
  const el = document.createElement("div");
  el.classList.add("emoji");
  el.innerText = emojis[Math.floor(Math.random()*emojis.length)];

  el.style.left = Math.random()*100 + "vw";
  el.style.animationDuration = (3 + Math.random()*5) + "s";

  document.body.appendChild(el);

  setTimeout(()=> el.remove(), 8000);
}

setInterval(createEmoji, 200);

/* hearts */
document.addEventListener("click", function(e){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerText = "💖";
  heart.style.left = e.clientX + "px";
  heart.style.top = e.clientY + "px";

  document.body.appendChild(heart);

  setTimeout(()=> heart.remove(), 1000);
});

/* generator (fără AI încă – sigur că merge) */
function generate() {
  const idea = document.getElementById("idea").value;
  const result = document.getElementById("result");

  if(!idea){
    result.innerText = "Scrie ceva 😄";
    return;
  }

  result.innerText =
    "🔥 HOOK: Ai văzut asta despre " + idea + "?\n" +
    "🎬 SCRIPT: început puternic + problemă + soluție\n" +
    "⚡ TWIST: final neașteptat viral";
}
</script>

</body>
</html>
