<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <title>AI TikTok Video Generator</title>
</head>

<body style="margin:0; font-family:Arial; background:#0f172a; color:white; display:flex; justify-content:center; align-items:center; height:100vh;">

  <div style="width:90%; max-width:600px; background:#1e293b; padding:30px; border-radius:20px; text-align:center;">

    <h1>AI TikTok Video Generator</h1>
    <p>Creează idei virale pentru nișa relații</p>

    <input id="input" placeholder="Scrie ideea ta..."
      style="width:100%; padding:12px; border-radius:10px; border:none; margin-top:10px;" />

    <button onclick="generate()"
      style="margin-top:15px; width:100%; padding:12px; background:#3b82f6; border:none; color:white; border-radius:10px; cursor:pointer;">
      Generează
    </button>

    <pre id="output"
      style="margin-top:20px; background:#0b1220; padding:15px; border-radius:10px; white-space:pre-wrap; text-align:left;">
    </pre>

  </div>

  <script>
    function generate() {
      const input = document.getElementById("input").value;

      if (!input) {
        document.getElementById("output").innerText = "Scrie o idee mai întâi!";
        return;
      }

      const result =
`🔥 TITLU VIRAL:
Poveste emoțională despre ${input}

🎬 SCRIPT VIDEO:
1. Spune: "Nu credeam că voi trece prin asta..."
2. Povestește despre ${input}
3. Final: "Dacă ai trecut prin asta, nu ești singur."

📱 CAPTION:
O poveste care doare... 💔

#relatii #viral #fyp #emotie`;

      document.getElementById("output").innerText = result;
    }
  </script>

</body>
</html>
