<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI TikTok Generator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  overflow: hidden;
  background: #0b0b0f;
  color: white;
}

/* emoji rain */
.emoji {
  position: absolute;
  top: -50px;
  font-size: 24px;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(110vh); }
}

.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 42px;
  text-shadow: 0 0 20px #ff00ff, 0 0 30px #00ffff;
}

button {
  margin-top: 20px;
  padding: 12px 24px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: linear-gradient(45deg,#ff00ff,#00ffff);
  font-weight: bold;
}

/* hearts */
.heart {
  position: absolute;
  font-size: 26px;
  animation: pop 1s ease-out forwards;
  pointer-events: none;
}

@keyframes pop {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: translateY(-120px) scale(2); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
  <h1>AI TikTok Generator 🚀</h1>
  <button onclick="alert('Funcționează ✔️')">Start</button>
</div>

<script>
const emojis = ["🔥","😂","💰","🚀","❤️","⚡","💎","😎"];

/* emoji rain */
setInterval(() => {
  const e = document.createElement("div");
  e.classList.add("emoji");
  e.innerText = emojis[Math.floor(Math.random()*emojis.length)];
  e.style.left = Math.random()*100 + "vw";
  e.style.animationDuration = (3 + Math.random()*5) + "s";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),8000);
}, 200);

/* hearts */
document.addEventListener("click", (e)=>{
  const h = document.createElement("div");
  h.classList.add("heart");
  h.innerText = "💖";
  h.style.left = e.clientX + "px";
  h.style.top = e.clientY + "px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),1000);
});
</script>

</body>
</html>
