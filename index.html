<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI TikTok Generator</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
  color: white;

  /* 🔥 imaginea ta ca fundal */
  background-image: url("/mnt/data/a_dark_futuristic_neon_tiktok_themed_digital_wall.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* overlay întunecat ca să se vadă textul */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(2px);
}

/* conținut */
.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 48px;
  margin: 0;
  text-shadow: 0 0 20px #ff00ff, 0 0 30px #00ffff;
}

p {
  font-size: 18px;
  opacity: 0.9;
  margin-top: 10px;
}

button {
  margin-top: 25px;
  padding: 14px 28px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(45deg,#ff00ff,#00ffff);
  color: black;
  box-shadow: 0 0 20px #ff00ff55;
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
  <h1>AI TikTok Video Generator 🚀</h1>
  <p>Generează videoclipuri virale în câteva secunde</p>
  <button>Start</button>
</div>

</body>
</html>
