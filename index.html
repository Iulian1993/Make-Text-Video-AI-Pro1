<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI TikTok Generator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  overflow: hidden;
  color: white;

  background-image: url("images/background.png");
  background-size: cover;
  background-position: center;
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
}

.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 48px;
  text-shadow: 0 0 20px #ff00ff, 0 0 30px #00ffff;
}

button {
  margin-top: 20px;
  padding: 12px 24px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: linear-gradient(45deg,#ff00ff,#00ffff);
}

#box {
  display:none;
  margin-top:20px;
}

input {
  padding:12px;
  border-radius:10px;
  border:none;
  width:250px;
}

#result {
  margin-top:15px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
  <h1>AI TikTok Generator 🚀</h1>

  <button onclick="document.getElementById('box').style.display='block'">
    Start
  </button>

  <div id="box">
    <input id="idea" placeholder="Scrie ideea ta..." />
    <br><br>
    <button onclick="generate()">Generează AI</button>

    <p id="result"></p>
  </div>
</div>

<script>
async function generate() {
  const idea = document.getElementById("idea").value;
  const resBox = document.getElementById("result");

  if(!idea){
    resBox.innerText = "Scrie ceva 😄";
    return;
  }

  resBox.innerText = "Se generează... 🤖";

  const res = await fetch("/api/generate", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ idea })
  });

  const data = await res.json();

  resBox.innerText = data.result;
}
</script>

</body>
</html>
